{% extends "base.html" %}
{% block title %}Add Property{% endblock %}

{% block content %}
  <div class="form-wrapper">
    <h1>Add New Property</h1>
    <form method="POST" action="{{ url_for('add_property') }}">
      <div class="field"><label>Title *</label><input type="text" name="title" placeholder="e.g. 2BHK Modern Apartment"></div>
      <div class="field"><label>City *</label><input type="text" name="city" placeholder="e.g. Coimbatore"></div>
      <div class="field"><label>Address</label><input type="text" name="address" placeholder="Street, area"></div>
      <div class="field"><label>Monthly Rent (₹) *</label><input type="number" name="price"></div>
      <div class="field"><label>Bedrooms</label><input type="number" name="bedrooms" value="1"></div>
      <div class="field"><label>Bathrooms</label><input type="number" name="bathrooms" value="1"></div>
      <div class="field"><label>Image URL</label><input type="text" name="image_url" placeholder="https://..."></div>
      <div class="field"><label>Description</label><textarea name="description"></textarea></div>
      <button type="submit" class="submit-btn">Add Property</button>
    </form>
  </div>
{% endblock %}
